# ============================================================
#  h4wk3y3 — docker-compose
#
#  Build context = repo root (..) so the image bakes the actual source.
#  Self-contained: every recon tool is in the image — deploy on ANY host
#  with Docker, no host-side tool install needed.
#
#  Topology:
#    postgres  → persistent DB (volume h4wk3y3-postgres-data)
#    h4wk3y3   → app + dashboard, depends on postgres healthy
#    scan      → ephemeral one-shot scan service (profile: scan)
#
#  Quick start (from this directory):
#    ./build.sh                        # bootstrap .env + volumes + build
#    make up                           # postgres + dashboard
#    make scan T=example.com           # one-shot full scan
#
#  Dashboard is published on 127.0.0.1 ONLY — reach it via SSH tunnel:
#    ssh -L 8000:127.0.0.1:8000 <user>@<vps>   →   http://localhost:8000
# ============================================================

name: h4wk3y3

services:
  # ── Postgres backend (canonical store) ──────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: h4wk3y3-postgres
    hostname: postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-h4wk3y3}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (no default — would be a public password)}
      POSTGRES_DB:       ${POSTGRES_DB:-h4wk3y3}
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=en-US"
    volumes:
      # postgres:18+ stores data in a version-specific subdir → mount the
      # parent /var/lib/postgresql (NOT /data, which the 18 image rejects).
      - h4wk3y3-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-h4wk3y3} -d ${POSTGRES_DB:-h4wk3y3}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    # Internal to the compose network. Uncomment for local debugging only.
    # ports:
    #   - "127.0.0.1:5432:5432"

  # ── h4wk3y3 app + dashboard ─────────────────────────────────
  h4wk3y3:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: h4wk3y3:latest
    container_name: h4wk3y3
    hostname: h4wk3y3

    depends_on:
      postgres:
        condition: service_healthy

    # Raw-socket scanners (rustscan SYN, naabu, nmap -sS) need these caps.
    cap_add:
      - NET_RAW
      - NET_ADMIN

    mem_limit: ${H4_MEM_LIMIT:-8g}
    shm_size: 2g            # mandatory for Playwright/Chromium (m05)

    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 9.9.9.9

    env_file:
      - .env

    environment:
      TZ: ${TZ:-UTC}
      # DSN for the postgres service. Read by core/db_engine.resolve_db_url
      # AND alembic/env.py, so app + migrations share one connection.
      ARGUS_DB_URL: "postgresql+psycopg://${POSTGRES_USER:-h4wk3y3}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-h4wk3y3}"

    # Dashboard published on host loopback only — the public entrypoint is the
    # caddy service (TLS on 443). Caddy reaches this over the compose network
    # (service name h4wk3y3:8000), so no public host publish is needed here.
    # Set H4_BIND=0.0.0.0 only if you want to bypass Caddy and expose raw HTTP.
    ports:
      - "${H4_BIND:-127.0.0.1}:${H4_DASHBOARD_PORT:-8000}:8000"

    volumes:
      - ./volumes/output:/home/kali/h4wk3y3/output
      - ./volumes/data:/home/kali/h4wk3y3/data
      - ./volumes/config/h4wk3y3.yaml:/home/kali/h4wk3y3/config/h4wk3y3.yaml
      - ./volumes/scopes:/home/kali/h4wk3y3/scopes
      - ./volumes/wildcards:/home/kali/h4wk3y3/wildcards
      - ./volumes/subfinder:/home/kali/.config/subfinder
      - h4wk3y3-nuclei-templates:/home/kali/.config/nuclei
      - h4wk3y3-playwright:/home/kali/.cache/ms-playwright

    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    restart: unless-stopped
    command: ["dashboard"]

  # ── Caddy reverse proxy (public TLS entrypoint) ─────────────
  caddy:
    image: caddy:2-alpine
    container_name: h4wk3y3-caddy
    hostname: caddy
    depends_on:
      h4wk3y3:
        condition: service_healthy
    environment:
      # Hostname served (resolved via your local hosts file), e.g. app.h4wk3y3.io
      H4_SITE_ADDRESS: ${H4_SITE_ADDRESS:?set H4_SITE_ADDRESS in .env (e.g. app.h4wk3y3.io)}
      # Gate 1: mandatory secret header value (X-H4-Key). Long random string.
      H4_ACCESS_KEY:   ${H4_ACCESS_KEY:?set H4_ACCESS_KEY in .env (long random secret)}
      # Gate 2: HTTP basic auth user + bcrypt hash (caddy hash-password).
      H4_BASIC_USER:   ${H4_BASIC_USER:?set H4_BASIC_USER in .env}
      H4_BASIC_HASH:   ${H4_BASIC_HASH:?set H4_BASIC_HASH in .env (caddy hash-password)}
    ports:
      - "443:443"
      - "443:443/udp"      # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - h4wk3y3-caddy-data:/data      # cert persistence (avoid LE rate limits)
      - h4wk3y3-caddy-config:/config
    restart: unless-stopped

  # ── Ephemeral one-shot scan job ─────────────────────────────
  scan:
    extends:
      service: h4wk3y3
    container_name: h4wk3y3-scan
    profiles: ["scan"]
    restart: "no"
    ports: []
    healthcheck:
      disable: true
    command: ["scan", "example.com", "--full"]

volumes:
  h4wk3y3-nuclei-templates:
    name: h4wk3y3-nuclei-templates
  h4wk3y3-playwright:
    name: h4wk3y3-playwright
  h4wk3y3-postgres-data:
    name: h4wk3y3-postgres-data
  h4wk3y3-caddy-data:
    name: h4wk3y3-caddy-data
  h4wk3y3-caddy-config:
    name: h4wk3y3-caddy-config
