[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    requires_external: tests that need external CLIs (subfinder, nuclei, dalfox, sqlmap, etc.) — skipped in CI by default
    slow: long-running tests (>30s)
    integration: end-to-end pipeline tests
    e2e: browser-driven UI tests (Playwright + Chromium + live server) — auto-skip if browser/DB unavailable
filterwarnings =
    ignore::DeprecationWarning
